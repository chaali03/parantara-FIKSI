name = "danamasjid-api"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "danamasjid-api-production"
routes = [
  { pattern = "api.danamasjid.com/*", custom_domain = true }
]

# Environment variables (non-sensitive)
[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://danamasjid.vercel.app"

# Secrets (set via: wrangler secret put SECRET_NAME)
# JWT_SECRET
# DATABASE_URL
# SMTP_HOST
# SMTP_PORT
# SMTP_USER
# SMTP_PASS
# RECAPTCHA_SECRET_KEY
