services:
  postgres:
    image: postgres:15-alpine
    container_name: danamasjid-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-danamasjid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-danamasjid_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-danamasjid}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/src/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - danamasjid-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: danamasjid-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-danamasjid}:${POSTGRES_PASSWORD:-danamasjid_secure_password}@postgres:5432/${POSTGRES_DB:-danamasjid}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      - postgres
    volumes:
      - ./api:/app
      - /app/node_modules
      - /app/dist
    networks:
      - danamasjid-network

volumes:
  postgres_data:

networks:
  danamasjid-network:
    driver: bridge
