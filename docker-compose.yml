
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: danamasjid_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-danamasjid}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-danamasjid123}
      POSTGRES_DB: ${DB_NAME:-danamasjid}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./api/src/db/migrations:/migrations
    networks:
      - danamasjid_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-danamasjid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service (Elysia)
  api:
    build:
      context: ./api
      target: development
    container_name: danamasjid_api
    restart: unless-stopped
    ports:
      - "3001:3001"  # API di port 3001
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-danamasjid}:${DB_PASSWORD:-danamasjid123}@postgres:5432/${DB_NAME:-danamasjid}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - danamasjid_network
    command: bun run dev

  # Frontend Service (Next.js)
  frontend:
    build:
      context: .
      target: development
    container_name: danamasjid_frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_URL: http://api:3001  # Internal communication
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - danamasjid_network
    command: npm run dev

  # Migration Service (one-time run)
  migration:
    build:
      context: ./api
      target: migration
    container_name: danamasjid_migration
    environment:
      DATABASE_URL: postgresql://${DB_USER:-danamasjid}:${DB_PASSWORD:-danamasjid123}@postgres:5432/${DB_NAME:-danamasjid}
    volumes:
      - ./api/src/db/migrations:/app/src/db/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - danamasjid_network
    command: bun run migrate
    profiles:
      - migrate

  # PgAdmin (optional - for DB management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: danamasjid_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@danamasjid.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - danamasjid_network
    depends_on:
      - postgres

networks:
  danamasjid_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: